<!DOCTYPE html>
<html>
<head>
<title>Profile</title>
<style>
body {
    font-family: Arial;
    background:#f4f6f9;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}
.card {
    background:white;
    padding:30px;
    width:300px;
    border-radius:10px;
    text-align:center;
}
button {
    margin-top:15px;
    padding:10px;
    width:100%;
    background:#2563eb;
    color:white;
    border:none;
}
</style>
</head>

<body>

<div class="card">
<h2>Profile</h2>

<p id="name"></p>
<p id="email"></p>

<button onclick="goBack()">Back</button>
</div>

<script>
const user = JSON.parse(localStorage.getItem("user"));

name.innerText = "Name: " + user.name;
email.innerText = "Email: " + user.email;

function goBack(){
    window.location.href="/";
}
</script>

</body>
</html>
