apiVersion: apps/v1
kind: Deployment
metadata:
  name: inventory-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: inventory-app
  template:
    metadata:
      labels:
        app: inventory-app
    spec:
      containers:
        - name: inventory-app
          image: vineeshreddy/inventory-app:latest   # ✅ IMPORTANT CHANGE
          imagePullPolicy: Always                   # ✅ Always pull latest image
          ports:
            - containerPort: 3000